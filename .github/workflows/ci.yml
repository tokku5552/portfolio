name: ci
on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - docs/**
      - .github/**
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  NEXT_PUBLIC_ENVIRONMENT: production
  NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
  NEXT_PUBLIC_QIITA_TOKEN: ${{ secrets.NEXT_PUBLIC_QIITA_TOKEN }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Set timezone
        run: echo "TZ=Asia/Tokyo" >> $GITHUB_ENV
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v3
        with:
          node-version: '20.20.2'
          cache: 'pnpm'
      - name: Cache node modules
        id: cache
        uses: actions/cache@v3
        with:
          path: '**/node_modules'
          key: cache-node-modules-${{ hashFiles('pnpm-lock.yaml') }}
      - name: pnpm install
        run: pnpm install --frozen-lockfile --ignore-scripts
  lint:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v3
        with:
          node-version: '20.20.2'
          cache: 'pnpm'
      - name: Cache node modules
        id: cache
        uses: actions/cache@v3
        with:
          path: '**/node_modules'
          key: cache-node-modules-${{ hashFiles('pnpm-lock.yaml') }}
      - name: pnpm lint
        run: pnpm lint
  test:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Set timezone
        run: echo "TZ=Asia/Tokyo" >> $GITHUB_ENV
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v3
        with:
          node-version: '20.20.2'
          cache: 'pnpm'
      - name: Cache node modules
        id: cache
        uses: actions/cache@v3
        with:
          path: '**/node_modules'
          key: cache-node-modules-${{ hashFiles('pnpm-lock.yaml') }}
      - name: pnpm test
        run: pnpm test
  build:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v3
        with:
          node-version: '20.20.2'
          cache: 'pnpm'
      - name: Cache node modules
        id: cache
        uses: actions/cache@v3
        with:
          path: '**/node_modules'
          key: cache-node-modules-${{ hashFiles('pnpm-lock.yaml') }}
      - name: build
        run: pnpm build
